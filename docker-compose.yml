version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: iphone17_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: iphone17secret
      MYSQL_DATABASE: iphone17db
      MYSQL_USER: iphone17user
      MYSQL_PASSWORD: iphone17pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - iphone17_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: iphone17_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: iphone17secret
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - iphone17_net

volumes:
  mysql_data:
    driver: local

networks:
  iphone17_net:
    driver: bridge
